<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; media-src 'self' https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self'; connect-src 'self' https://formsubmit.co; base-uri 'self'; form-action 'self' https://formsubmit.co; object-src 'none'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demande envoyée | Zepoul Ayiti</title>
  <meta name="description" content="Confirmation d'envoi de votre demande de cotation Zepoul Ayiti." />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://zepoulayiti.com/merci.html" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="logo-optimized.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="site.css" />
  <style>
    :root {
      --primary: #1a7f37;
      --primary-dark: #0b3d1a;
      --text-main: #1b1b1b;
      --text-muted: #626b70;
      --surface: #ffffff;
      --surface-soft: #f5faf7;
      --border: rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--text-main);
      background: radial-gradient(1000px 420px at 70% -10%, rgba(26, 127, 55, 0.1), transparent), var(--surface-soft);
    }

    .card {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    .card img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      border: 1px solid var(--border);
      object-fit: cover;
    }

    h1 {
      margin: 14px 0 10px;
      font-family: "Playfair Display", serif;
      color: var(--primary-dark);
      font-size: clamp(1.9rem, 4.8vw, 2.6rem);
      line-height: 1.15;
    }

    p {
      margin: 0 auto;
      max-width: 56ch;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 800;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 20px rgba(26, 127, 55, 0.22);
    }

    .btn-secondary {
      border: 2px solid rgba(26, 127, 55, 0.28);
      color: var(--primary-dark);
      background: #fff;
    }
  </style>
  <link rel="stylesheet" href="polish.css">
</head>
<body data-page="merci">
  <main class="card">
    <img src="logo-optimized.png" alt="Logo Zepoul Ayiti" width="64" height="64" />
    <h1>Confirmation de réception de la demande de cotation</h1>
    <p>
      Votre demande de cotation a bien été enregistrée. Notre équipe commerciale vous répondra
      dans les meilleurs délais à l’adresse fournie.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="index.html">Retour à l’accueil</a>
      <a class="btn btn-secondary" href="services.html">Consulter nos services</a>
    </div>
  </main>

  <script defer src="analytics.js"></script>
  <script defer src="site.js"></script>
</body>
</html>
